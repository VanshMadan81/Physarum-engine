name: Week 3 Steer Logic Compilation Check

# Only trigger this robot when someone opens a Pull Request into the main branch
on:
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest # GitHub provides a fresh Linux server

    steps:
    # 1. Download the mentee's code onto the server
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. Install the OpenGL and GLFW graphics libraries on the Linux server
    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake g++ libglfw3-dev libgl1-mesa-dev

    # 3. Generate the build files
    - name: Configure CMake
      run: cmake -S . -B build

    # 4. Attempt to compile the Engine
    - name: Build Engine
      run: cmake --build build